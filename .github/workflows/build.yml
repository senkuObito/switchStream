name: Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Build Linux Simulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libsdl2-ttf-dev \
            libsdl2-image-dev \
            libcurl4-openssl-dev \
            rapidjson-dev \
            libmpv-dev

      - name: Compile Simulator
        run: make -f Makefile.linux

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: switchstream_sim
          path: switchstream_sim

  build-switch:
    name: Build Switch Homebrew (NRO)
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache devkitPro
        id: cache-devkitpro
        uses: actions/cache@v4
        with:
          path: /opt/devkitpro
          key: ${{ runner.os }}-devkitpro-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install Switch Dependencies
        if: steps.cache-devkitpro.outputs.cache-hit != 'true'
        run: |
          # Configure pacman to use a custom User-Agent to bypass Cloudflare 403 blocks
          CONF_FILES="/etc/pacman.conf /opt/devkitpro/pacman/etc/pacman.conf"
          for f in $CONF_FILES; do
            if [ -f "$f" ]; then
              echo "Configuring User-Agent in $f"
              if grep -q "XferCommand" "$f"; then
                sed -i 's|^#\?XferCommand.*|XferCommand = /usr/bin/curl -A "dkp-pacman" -g -L -C - -o %o %u|' "$f"
              else
                sed -i '/\[options\]/a XferCommand = /usr/bin/curl -A "dkp-pacman" -g -L -C - -o %o %u' "$f"
              fi
            fi
          done

          # Clear any corrupted sync databases
          rm -rf /var/lib/pacman/sync/*

          # Install dependencies
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm \
            switch-dev \
            switch-sdl2 \
            switch-sdl2_ttf \
            switch-sdl2_image \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            switch-libpng \
            switch-libjpeg-turbo \
            switch-rapidjson \
            switch-mpv

      - name: Compile NRO
        run: |
          export DEVKITPRO=/opt/devkitpro
          make

      - name: Upload Switch NRO
        uses: actions/upload-artifact@v4
        with:
          name: switchstream_nro
          path: |
            switchstream.nro
            switchstream.nacp
            switchstream.elf
